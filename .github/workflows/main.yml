name: Builds, tests & co

on:
  - push
  - pull_request

permissions: read-all

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        ocaml-compiler:
          - 5
        include:
          - os: ubuntu-latest
            ocaml-compiler: 4.08

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}

      - run: |
          # work around https://github.com/ocaml/setup-ocaml/issues/899
          opam install conf-pkg-config
          opam install . --deps-only --with-test

      - run: opam install lwt lwt_ppx # optional deps

      - env:
          PKG_CONFIG_PATH: /usr/x86_64-w64-mingw32/sys-root/mingw/lib/pkgconfig
        run: opam exec -- dune build

      - env:
          PATH: D:\cygwin\usr\x86_64-w64-mingw32\sys-root\mingw\bin;${{ env.PATH }}
        run: |
          Get-Item Env:PATH
          opam exec -- dune runtest
